<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0d0d; color:#fff; font-family:-apple-system, sans-serif; min-height:100vh; }
header { background:linear-gradient(135deg,#ff6b00,#ff9500); padding:20px; text-align:center; position:sticky; top:0; z-index:100; }
header h1 { font-size:1.8em; font-weight:800; }
header p { font-size:0.85em; opacity:0.9; margin-top:4px; }
.muscles-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:20px; }
.muscle-btn { background:#1a1a1a; border:2px solid #333; border-radius:16px; padding:20px 10px; text-align:center; cursor:pointer; color:#fff; transition:all 0.2s; }
.muscle-btn:active { border-color:#ff6b00; background:#2a1500; transform:scale(0.97); }
.muscle-btn .icon { font-size:2.5em; margin-bottom:8px; }
.muscle-btn .name { font-size:0.95em; font-weight:600; }
.exercises-page { display:none; padding-bottom:60px; }
.exercises-page.visible { display:block; }
.back-btn { background:#ff6b00; color:#fff; border:none; padding:12px 20px; margin:16px 20px; border-radius:12px; font-size:1em; font-weight:600; cursor:pointer; display:block; width:calc(100% - 40px); }
.section-title { padding:0 20px 16px; font-size:1.4em; font-weight:800; color:#ff6b00; }
.exercise-card { background:#1a1a1a; border-radius:16px; margin:0 20px 20px; overflow:hidden; border:1px solid #2a2a2a; }
.gif-container { width:100%; height:240px; background:#111; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.gif-container img { width:100%; height:100%; object-fit:contain; background:#111; }
.exercise-info { padding:16px; }
.exercise-info h3 { font-size:1.15em; font-weight:700; margin-bottom:8px; color:#fff; }
.exercise-info p { font-size:0.88em; color:#aaa; line-height:1.6; margin-bottom:12px; }
.tags { display:flex; flex-wrap:wrap; gap:6px; }
.tag { background:#ff6b0022; color:#ff9500; border:1px solid #ff6b0044; border-radius:20px; padding:4px 12px; font-size:0.78em; font-weight:600; }
.home-page { display:block; }
.home-page.hidden { display:none; }
.no-img { color:#555; font-size:0.9em; text-align:center; padding:20px; }
</style>
</head>
<body>

  </header>

    <div class="muscle-btn" onclick="showMuscle('biceps')"><div class="icon">💪</div><div class="name">Biceps</div></div>
    <div class="muscle-btn" onclick="showMuscle('triceps')"><div class="icon">🦾</div><div class="name">Triceps</div></div>
    <div class="muscle-btn" onclick="showMuscle('jambes')"><div class="icon">🦵</div><div class="name">Jambes</div></div>
    <div class="muscle-btn" onclick="showMuscle('abdos')"><div class="icon">🔥</div><div class="name">Abdominaux</div></div>
    <div class="muscle-btn" onclick="showMuscle('fessiers')"><div class="icon">🍑</div><div class="name">Fessiers</div></div>
  </div>
</div>

function showMuscle(muscle) {
  const d = data[muscle];
  document.getElementById('home').classList.add('hidden');
  document.getElementById('header-subtitle').textContent = d.label;
  document.getElementById('section-title').textContent = d.label;
  const list = document.getElementById('exercises-list');
  list.innerHTML = '';
  d.exercices.forEach(ex => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.innerHTML = `
      <div class="gif-container">
        <img src="${ex.gif}" alt="${ex.nom}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-img>🏋️ Image non disponible</div>'">
      </div>
      <div class="exercise-info">
        <h3>${ex.nom}</h3>
        <p>${ex.desc}</p>
        <div class="tags">${ex.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    `;
    list.appendChild(card);
  });
  document.getElementById('exercises-page').classList.add('visible');
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('exercises-page').classList.remove('visible');
  document.getElementById('home').classList.remove('hidden');
  window.scrollTo(0, 0);
}
