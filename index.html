<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitMove 💪</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0d0d; color:#fff; font-family:-apple-system, sans-serif; }
header { background:linear-gradient(135deg,#ff6b00,#ff9500); padding:20px; text-align:center; position:sticky; top:0; z-index:100; }
header h1 { font-size:1.8em; font-weight:800; }
header p { font-size:0.85em; opacity:0.9; margin-top:4px; }
.muscles-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:20px; }
.muscle-btn { background:#1a1a1a; border:2px solid #333; border-radius:16px; padding:20px 10px; text-align:center; cursor:pointer; transition:all 0.2s; }
.muscle-btn:active { border-color:#ff6b00; background:#2a1500; transform:scale(0.97); }
.muscle-btn .icon { font-size:2.5em; margin-bottom:8px; }
.muscle-btn .name { font-size:0.95em; font-weight:600; }
.page { display:none; }
.page.visible { display:block; padding-bottom:40px; }
.back-btn { background:#ff6b00; color:#fff; border:none; padding:14px 20px; margin:16px 20px; border-radius:12px; font-size:1em; font-weight:600; cursor:pointer; display:block; width:calc(100% - 40px); }
.section-title { padding:0 20px 16px; font-size:1.4em; font-weight:800; color:#ff6b00; }
.exercise-card { background:#1a1a1a; border-radius:16px; margin:0 20px 20px; overflow:hidden; border:1px solid #2a2a2a; }
.gif-wrap { width:100%; height:260px; background:#111; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.gif-wrap img { width:100%; height:100%; object-fit:contain; background:#111; }
.card-body { padding:16px; }
.card-body h3 { font-size:1.1em; font-weight:700; margin-bottom:8px; color:#ff9500; }
.card-body p { font-size:0.88em; color:#ccc; line-height:1.5; margin-bottom:12px; }
.tags { display:flex; flex-wrap:wrap; gap:6px; }
.tag { background:#2a2a2a; color:#ff6b00; border-radius:20px; padding:4px 10px; font-size:0.75em; font-weight:600; }
.loading { text-align:center; padding:40px; color:#888; font-size:1em; }
.spinner { font-size:2em; animation:spin 1s linear infinite; display:inline-block; margin-bottom:10px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="home" class="page visible">
  <header><h1>💪 FitMove</h1><p>Choisis un muscle à travailler</p></header>
  <div class="muscles-grid">
    <div class="muscle-btn" onclick="showMuscle('pectoraux')"><div class="icon">🫁</div><div class="name">Pectoraux</div></div>
    <div class="muscle-btn" onclick="showMuscle('dos')"><div class="icon">🔙</div><div class="name">Dos</div></div>
    <div class="muscle-btn" onclick="showMuscle('epaules')"><div class="icon">🏋️</div><div class="name">Épaules</div></div>
    <div class="muscle-btn" onclick="showMuscle('biceps')"><div class="icon">💪</div><div class="name">Biceps</div></div>
    <div class="muscle-btn" onclick="showMuscle('triceps')"><div class="icon">🦾</div><div class="name">Triceps</div></div>
    <div class="muscle-btn" onclick="showMuscle('jambes')"><div class="icon">🦵</div><div class="name">Jambes</div></div>
    <div class="muscle-btn" onclick="showMuscle('abdos')"><div class="icon">🔥</div><div class="name">Abdominaux</div></div>
    <div class="muscle-btn" onclick="showMuscle('fessiers')"><div class="icon">🍑</div><div class="name">Fessiers</div></div>
  </div>
</div>

<div id="exo-page" class="page">
  <header><h1>💪 FitMove</h1><p id="sub"></p></header>
  <button class="back-btn" onclick="goBack()">← Retour</button>
  <div class="section-title" id="stitle"></div>
  <div id="exo-list"></div>
</div>

<script>
const muscles = {
  pectoraux: {
    label: "🫁 Pectoraux",
    exercices: [
      { nom:"Pompes", desc:"En position planche, mains à largeur d'épaules. Descendez la poitrine vers le sol puis remontez.", tags:["Pectoraux","Triceps","Épaules"], gif:"https://media.tenor.com/WTGP_muRIoMAAAAd/push-up-exercise.gif" },
      { nom:"Développé couché", desc:"Allongé sur un banc, descendez la barre jusqu'à la poitrine puis poussez vers le haut.", tags:["Pectoraux","Triceps"], gif:"https://media.tenor.com/j7oqfQp7EvMAAAAd/bench-press.gif" },
      { nom:"Écarté haltères", desc:"Allongé sur banc, bras en arc de cercle, montez les haltères au centre puis redescendez.", tags:["Pectoraux"], gif:"https://media.tenor.com/IDm5s5GxJhsAAAAd/dumbbell-fly.gif" },
      { nom:"Dips pectoraux", desc:"Entre deux barres, penchez le buste en avant et fléchissez les coudes.", tags:["Pectoraux","Triceps"], gif:"https://media.tenor.com/BSTGZbcjkBMAAAAd/dips-chest.gif" }
    ]
  },
  dos: {
    label: "🔙 Dos",
    exercices: [
      { nom:"Traction", desc:"Suspendez-vous à une barre, tirez votre corps vers le haut jusqu'au menton.", tags:["Grand dorsal","Biceps"], gif:"https://media.tenor.com/IB7g5HdSRPUAAAAd/pull-up.gif" },
      { nom:"Rowing haltère", desc:"Un genou sur banc, tirez l'haltère vers la hanche, dos bien plat.", tags:["Dos","Biceps"], gif:"https://media.tenor.com/0mW8FWwkOEoAAAAd/dumbbell-row.gif" },
      { nom:"Soulevé de terre", desc:"Pieds écartés, dos droit, soulevez la barre depuis le sol jusqu'à la position debout.", tags:["Dos","Jambes","Fessiers"], gif:"https://media.tenor.com/qH_2SbMpqDIAAAAd/deadlift.gif" },
      { nom:"Tirage vertical", desc:"Assis à la poulie, tirez la barre vers la poitrine en contractant bien le dos.", tags:["Grand dorsal","Biceps"], gif:"https://media.tenor.com/pQ4P7YhJdGYAAAAd/lat-pulldown.gif" }
    ]
  },
  epaules: {
    label: "🏋️ Épaules",
    exercices: [
      { nom:"Développé militaire", desc:"Debout ou assis, poussez les haltères au-dessus de la tête jusqu'à extension complète.", tags:["Épaules","Triceps"], gif:"https://media.tenor.com/1_pBpNs9GtEAAAAd/shoulder-press.gif" },
      { nom:"Élévation latérale", desc:"Debout, levez les bras tendus sur les côtés jusqu'à hauteur des épaules.", tags:["Épaules latérales"], gif:"https://media.tenor.com/3-MMStMJoE8AAAAd/lateral-raise.gif" },
      { nom:"Élévation frontale", desc:"Levez les haltères devant vous jusqu'à hauteur des épaules, alternativement.", tags:["Épaules avant"], gif:"https://media.tenor.com/tG5UC3RqMBAAAAAd/front-raise.gif" },
      { nom:"Oiseau", desc:"Penché en avant, levez les haltères sur les côtés pour les deltoïdes arrière.", tags:["Épaules arrière"], gif:"https://media.tenor.com/WKCbAGDMvIgAAAAd/rear-delt-fly.gif" }
    ]
  },
  biceps: {
    label: "💪 Biceps",
    exercices: [
      { nom:"Curl haltères", desc:"Debout, fléchissez les coudes pour amener les haltères vers les épaules.", tags:["Biceps"], gif:"https://media.tenor.com/lkAJPh_gnG4AAAAd/bicep-curl.gif" },
      { nom:"Curl marteau", desc:"Paumes se faisant face, montez les haltères sans tourner les poignets.", tags:["Biceps","Avant-bras"], gif:"https://media.tenor.com/x5HLEi0vdEIAAAAd/hammer-curl.gif" },
      { nom:"Curl barre", desc:"Saisissez une barre en supination et fléchissez sans bouger les coudes.", tags:["Biceps"], gif:"https://media.tenor.com/QvQmFkDqiWYAAAAd/barbell-curl.gif" },
      { nom:"Curl concentré", desc:"Assis, coude sur la cuisse. Fléchissez lentement pour une contraction maximale.", tags:["Biceps"], gif:"https://media.tenor.com/JWXpVe-MH4kAAAAd/concentration-curl.gif" }
    ]
  },
  triceps: {
    label: "🦾 Triceps",
    exercices: [
      { nom:"Extension triceps", desc:"Haltère tenu à deux mains derrière la tête, étendez les bras vers le haut.", tags:["Triceps"], gif:"https://media.tenor.com/6A0U4JYQD0gAAAAd/tricep-extension.gif" },
      { nom:"Dips banc", desc:"Mains sur un banc derrière vous, fléchissez les coudes pour descendre puis remontez.", tags:["Triceps"], gif:"https://media.tenor.com/BSTGZbcjkBMAAAAd/tricep-dips.gif" },
      { nom:"Pushdown poulie", desc:"Coudes collés au corps, poussez la corde vers le bas jusqu'à extension complète.", tags:["Triceps"], gif:"https://media.tenor.com/Yd4k1bxEp2EAAAAd/tricep-pushdown.gif" },
      { nom:"Skull crusher", desc:"Allongé sur banc, fléchissez les coudes pour amener la barre vers le front.", tags:["Triceps"], gif:"https://media.tenor.com/HXzZrPHHNzYAAAAd/skull-crusher.gif" }
    ]
  },
  jambes: {
    label: "🦵 Jambes",
    exercices: [
      { nom:"Squat", desc:"Pieds écartés, descendez les hanches en gardant le dos droit puis remontez.", tags:["Quadriceps","Fessiers"], gif:"https://media.tenor.com/6RHXKRCP4i8AAAAd/squat.gif" },
      { nom:"Fente avant", desc:"Grand pas en avant, fléchissez les deux genoux à 90° puis revenez.", tags:["Quadriceps","Fessiers"], gif:"https://media.tenor.com/MfFLhXJrJkYAAAAd/lunges.gif" },
      { nom:"Leg press", desc:"Assis à la machine, poussez la plateforme avec les deux pieds.", tags:["Quadriceps","Fessiers"], gif:"https://media.tenor.com/O1b8-VCLWiQAAAAd/leg-press.gif" },
      { nom:"Mollet debout", desc:"Debout sur une marche, montez sur la pointe des pieds puis redescendez lentement.", tags:["Mollets"], gif:"https://media.tenor.com/N47_lmLmVqUAAAAd/calf-raise.gif" }
    ]
  },
  abdos: {
    label: "🔥 Abdominaux",
    exercices: [
      { nom:"Crunch", desc:"Allongé sur le dos, genoux fléchis. Contractez les abdos pour lever les épaules.", tags:["Abdominaux"], gif:"https://media.tenor.com/JIjBNGJYJEkAAAAd/crunch.gif" },
      { nom:"Planche", desc:"Sur les avant-bras et orteils, maintenez le corps bien aligné.", tags:["Abdominaux","Gainage"], gif:"https://media.tenor.com/WoMg4-DLhFcAAAAd/plank.gif" },
      { nom:"Relevé de jambes", desc:"Allongé, montez les jambes tendues à la verticale sans toucher le sol.", tags:["Abdominaux bas"], gif:"https://media.tenor.com/aqvMpGSqpCAAAAAd/leg-raises.gif" },
      { nom:"Russian twist", desc:"Assis, pieds levés. Tournez le buste de droite à gauche avec un poids.", tags:["Abdominaux","Obliques"], gif:"https://media.tenor.com/r58K3EFNq4IAAAAd/russian-twist.gif" }
    ]
  },
  fessiers: {
    label: "🍑 Fessiers",
    exercices: [
      { nom:"Hip thrust", desc:"Dos appuyé sur banc, poussez les hanches vers le haut en contractant les fessiers.", tags:["Fessiers","Ischio"], gif:"https://media.tenor.com/RWTAFUzHxpUAAAAd/hip-thrust.gif" },
      { nom:"Pont fessier", desc:"Allongé sur le dos, genoux fléchis. Poussez les hanches vers le plafond.", tags:["Fessiers","Lombaires"], gif:"https://media.tenor.com/XoSfMbdWp1EAAAAd/glute-bridge.gif" },
      { nom:"Squat sumo", desc:"Pieds très écartés, orteils vers l'extérieur. Descendez lentement.", tags:["Fessiers","Adducteurs"], gif:"https://media.tenor.com/VFxjCagBSXoAAAAd/sumo-squat.gif" },
      { nom:"Donkey kick", desc:"À quatre pattes, poussez un talon vers le plafond en contractant le fessier.", tags:["Fessiers"], gif:"https://media.tenor.com/S9R_7JZNwVcAAAAd/donkey-kicks.gif" }
    ]
  }
};

function showMuscle(m) {
  const d = muscles[m];
  document.getElementById('home').classList.remove('visible');
  document.getElementById('sub').textContent = d.label;
  document.getElementById('stitle').textContent = d.label;
  const list = document.getElementById('exo-list');
  list.innerHTML = '';
  d.exercices.forEach(ex => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.innerHTML = `
      <div class="gif-wrap">
        <img src="${ex.gif}" alt="${ex.nom}" loading="lazy"
          onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;\\'><div style=\\'font-size:3.5em;\\'>${ex.tags[0]==='Pectoraux'?'🫁':ex.tags[0]==='Biceps'?'💪':ex.tags[0]==='Triceps'?'🦾':ex.tags[0]==='Épaules'||ex.tags[0]==='Épaules latérales'||ex.tags[0]==='Épaules avant'||ex.tags[0]==='Épaules arrière'?'🏋️':ex.tags[0]==='Grand dorsal'||ex.tags[0]==='Dos'?'🔙':ex.tags[0]==='Abdominaux'||ex.tags[0]==='Gainage'?'🔥':ex.tags[0]==='Fessiers'?'🍑':'🦵'}</div><div style=\\'color:#ff6b00;font-weight:700;font-size:1em;text-align:center;\\'>${ex.nom}</div></div>'">
      </div>
      <div class="card-body">
        <h3>${ex.nom}</h3>
        <p>${ex.desc}</p>
        <div class="tags">${ex.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>`;
    list.appendChild(card);
  });
  document.getElementById('exo-page').classList.add('visible');
  window.scrollTo(0,0);
}

function goBack() {
  document.getElementById('exo-page').classList.remove('visible');
  document.getElementById('home').classList.add('visible');
  window.scrollTo(0,0);
}
</script>
</body>
</html>
